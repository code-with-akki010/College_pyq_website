<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusBytes - Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="admin.css">
</head>

<body>
    <!--  Navbar -->
    <nav class="navbar">
        <div class="logo"><i class="fa-solid fa-graduation-cap"></i> CampusBytes</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="login.html" class="active">Login</a></li>
            <li><a href="index.html#contact">Contact</a></li>
        </ul>
    </nav>
    <header>
        <h1><i class="fa-solid fa-gear"></i> Admin Dashboard - CampusBytes</h1>
    </header>

    <main>
        <section>
            <h2>Upload New Question Paper</h2>
            <form>
                <label for="semester">Semester:</label>
                <input type="number" id="semester" min="1" max="8" required>

                <label for="subject">Subject:</label>
                <input type="text" id="subject" required>

                <label for="category">Category:</label>
                <select id="category" required>
                    <option value="Internal">Internal</option>
                    <option value="External">External</option>
                    <option value="Practical">Practical</option>
                </select>

                <label for="year">Year:</label>
                <input type="number" id="year" required>

                <label for="file">Upload File:</label>
                <input type="file" id="file" accept=".pdf" required>

                <button type="submit">Upload</button>
            </form>
        </section>
    </main>

    <footer>
        <div class="footer-social">
            <a href="#"><i class="fab fa-facebook"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-linkedin"></i></a>
            <a href="#"><i class="fab fa-github"></i></a>
        </div>
        <p><i class="fa-solid fa-folder-open"></i> Manage Your CampusBytes Database</p>
        <p>© 2025 <span class="brand">CampusBytes</span></p>
    </footer>
    <script src="admin.js"></script>

</body>

</html>
