<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusBytes - Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="theme.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo"><i class="fa-solid fa-graduation-cap"></i> CampusBytes</div>
        <button class="nav-toggle" type="button" aria-label="Open navigation" aria-expanded="false" aria-controls="primary-nav">
            <i class="fa-solid fa-bars"></i>
        </button>
        <ul class="nav-links" id="primary-nav">
            <li><a href="index.html">Home</a></li>
            <li><a href="login.html" class="active">Login</a></li>
            <li><a href="index.html#contact">Contact</a></li>
            <li>
                <button class="theme-toggle" type="button" aria-label="Switch theme" title="Switch theme">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </li>
        </ul>
    </nav>

    <header>
        <h1><i class="fa-solid fa-gear"></i> Admin Dashboard - CampusBytes</h1>
    </header>

    <main>
        <!-- Dashboard Stats -->
        <section class="dashboard-section">
            <h2><i class="fa-solid fa-chart-simple"></i> Library Overview</h2>

            <div class="stats-grid" id="stats-grid">
                <article class="stat-card">
                    <i class="fa-solid fa-spinner"></i>
                    <div>
                        <span>Loading</span>
                        <strong>--</strong>
                    </div>
                </article>
            </div>

            <div class="latest-panel">
                <h3><i class="fa-solid fa-clock-rotate-left"></i> Latest Uploads</h3>
                <ul id="latest-uploads">
                    <li>Fetching recent papers...</li>
                </ul>
            </div>
        </section>

        <!-- Upload Section -->
        <section class="upload-section">
            <h2><i class="fa-solid fa-cloud-arrow-up"></i> Upload New Question Paper</h2>

            <div id="status-msg" class="status-msg"></div>

            <form id="upload-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="semester">Semester</label>
                        <input type="number" id="semester" min="1" max="8" placeholder="e.g. 3" required>
                    </div>

                    <div class="form-group">
                        <label for="subject">Subject Name</label>
                        <input type="text" id="subject" placeholder="e.g. Database Management" required>
                    </div>

                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" required>
                            <option value="">-- Select --</option>
                            <option value="Internal">Internal</option>
                            <option value="External">External</option>
                            <option value="Practical">Practical</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="year">Year</label>
                        <input type="number" id="year" min="2000" max="2100" placeholder="e.g. 2023" required>
                    </div>
                </div>

                <div class="form-group file-group">
                    <label for="file"><i class="fa-solid fa-file-pdf"></i> Upload PDF</label>
                    <input type="file" id="file" accept=".pdf" required>
                </div>

                <button type="submit" class="btn-upload">
                    <i class="fa-solid fa-upload"></i> Upload &amp; Auto-Save
                </button>
            </form>
        </section>

        <!-- Uploaded Papers List -->
        <section class="papers-section">
            <h2><i class="fa-solid fa-folder-open"></i> All Uploaded Papers</h2>
            <ul id="papers-list">
                <li class="loading">Connecting to server…</li>
            </ul>
        </section>
    </main>

    <footer>
        <div class="footer-social">
            <a href="https://www.facebook.com/share/1TsRivwg8m/"><i class="fab fa-facebook"></i></a>
            <a href="https://www.instagram.com/akshay_basak_?igsh=OHRtZDM5ajVjZXY3"><i class="fab fa-instagram"></i></a>
            <a href="https://www.linkedin.com/in/akshay-basak-31384a388"><i class="fab fa-linkedin"></i></a>
            <a href="https://github.com/code-with-akki010"><i class="fab fa-github"></i></a>
        </div>
        <p><i class="fa-solid fa-folder-open"></i> Manage Your CampusBytes Database</p>
        <p>© 2026 <span class="brand">CampusBytes</span></p>
    </footer>

    <script src="theme.js"></script>
    <script src="config.js"></script>
    <script src="admin.js"></script>
</body>

</html>
